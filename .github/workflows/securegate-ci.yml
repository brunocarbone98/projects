name: SecureGate CI

# SecureGate is a black-box QA suite: it needs a running Shipping Hub. This pipeline
# stands up PostgreSQL + the API + the web app, seeds demo data, then runs the full
# suite (REST Assured API + Cucumber BDD + Selenium UI) and publishes an Allure report.
on:
  pull_request:
    paths:
      - "SecureGate/**"
      - "FullStackHub/**"
      - ".github/workflows/securegate-ci.yml"
  push:
    branches: [main]
    paths:
      - "SecureGate/**"
      - ".github/workflows/securegate-ci.yml"
  schedule:
    - cron: "0 6 * * *" # nightly regression at 06:00 UTC

jobs:
  qa-suite:
    name: API + BDD + UI vs. local Shipping Hub
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: shipping
          POSTGRES_PASSWORD: shipping
          POSTGRES_DB: shipping_hub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shipping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://shipping:shipping@localhost:5432/shipping_hub?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-change-me
      JWT_REFRESH_SECRET: ci-refresh-secret-change-me
      PORT: "4000"
      CORS_ORIGINS: http://localhost:3000
      PUBLIC_WEB_URL: http://localhost:3000
      API_INTERNAL_URL: http://localhost:4000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: FullStackHub/pnpm-lock.yaml

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true
          install-chromedriver: true

      - name: Remove any stale chromedriver from PATH
        run: sudo rm -f /usr/bin/chromedriver /usr/local/bin/chromedriver || true

      - name: Install Shipping Hub dependencies
        working-directory: FullStackHub
        run: pnpm install --frozen-lockfile

      - name: Migrate + seed the database
        working-directory: FullStackHub
        run: |
          pnpm --filter @shipping-hub/api db:deploy
          pnpm --filter @shipping-hub/api db:seed

      - name: Start the Shipping Hub API
        working-directory: FullStackHub
        run: |
          nohup pnpm --filter @shipping-hub/api start > /tmp/api.log 2>&1 &
          curl -sS --retry 60 --retry-delay 1 --retry-connrefused -m 60 http://localhost:4000/health
          echo "API is up."

      - name: Build + start the Shipping Hub web app
        working-directory: FullStackHub
        env:
          PORT: "3000" # the web listens on 3000; the API already owns 4000 (job-level PORT)
        run: |
          pnpm --filter @shipping-hub/web build
          nohup pnpm --filter @shipping-hub/web start > /tmp/web.log 2>&1 &
          curl -sS --retry 90 --retry-delay 2 --retry-connrefused -m 180 -o /dev/null http://localhost:3000/en
          echo "Web is up."

      - name: Run the SecureGate suite (API + BDD + UI)
        working-directory: SecureGate
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
          CHROMEDRIVER_BIN: ${{ steps.chrome.outputs.chromedriver-path }}
        run: ./mvnw -B verify -DexcludedGroups=ratelimit

      - name: Generate the Allure report
        if: always()
        working-directory: SecureGate
        run: ./mvnw -B -q allure:report || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: securegate-reports
          path: |
            SecureGate/target/site/allure-maven-plugin/
            SecureGate/target/cucumber/
            SecureGate/target/screenshots/
            SecureGate/target/failsafe-reports/
          if-no-files-found: ignore

      - name: SonarQube quality gate (when SONAR_TOKEN is configured)
        if: ${{ env.SONAR_TOKEN != '' }}
        working-directory: SecureGate
        run: >-
          ./mvnw -B -DskipTests sonar:sonar
          -Dsonar.token=$SONAR_TOKEN
          -Dsonar.projectKey=${{ github.repository_owner }}_securegate
          -Dsonar.organization=${{ github.repository_owner }}

      - name: Service logs (on failure)
        if: failure()
        run: |
          echo "--- API log ---"; tail -n 80 /tmp/api.log || true
          echo "--- Web log ---"; tail -n 80 /tmp/web.log || true
