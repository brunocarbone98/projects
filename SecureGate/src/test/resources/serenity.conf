# Serenity BDD configuration for the SecureGate UI (Screenplay) acceptance suite.

serenity {
  project.name = "SecureGate"
  # A screenshot is captured for failures only (kept lean; the report links them on the timeline).
  take.screenshots = FOR_FAILURES
  # Tag the reports so the Serenity dashboard groups them under the right feature.
  restart.browser.for.each = scenario
}

# Chrome runs in a real, VISIBLE window by default so you can watch the actor replay each scenario.
# CI (or any headless machine) opts back into headless with -Dheadless.mode=true.
headless.mode = false

webdriver {
  driver = chrome
  # Selenium Manager / WebDriverManager resolves a matching driver automatically. CI pins an explicit
  # one by passing -Dwebdriver.chrome.driver=$CHROMEDRIVER_BIN.
  autodownload = true
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = [
        "--no-sandbox",
        "--disable-dev-shm-usage",
        "--disable-gpu",
        "--window-size=1280,900",
        "--remote-allow-origins=*"
      ]
      # CI sets CHROME_BIN to the installed Chrome; omitted (no key) when the env var is absent.
      binary = ${?CHROME_BIN}
    }
  }
}

# Explicit-wait defaults for Screenplay interactions (no Thread.sleep anywhere).
serenity.timeout = 15000
