<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shipping Hub — Interactive demo</title>
    <meta
      name="description"
      content="Interactive static demo of Shipping Hub: track parcels, get quotes, create shipments, pay from a wallet — all running in your browser." />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>" />

    <!-- Tailwind (Play CDN) with the same brand palette as the full-stack app. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Guarded so a blocked/offline CDN degrades gracefully instead of throwing.
      if (window.tailwind)
        tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#eef2ff", 100: "#e0e7ff", 200: "#c7d2fe", 300: "#a5b4fc", 400: "#818cf8",
                500: "#6366f1", 600: "#4f46e5", 700: "#4338ca", 800: "#3730a3", 900: "#312e81", 950: "#1e1b4b",
              },
              accent: { 400: "#fbbf24", 500: "#f59e0b", 600: "#d97706" },
            },
          },
        },
      };
    </script>

    <!-- Leaflet for the route map. -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body class="bg-slate-50 text-slate-800 antialiased">
    <div id="app"></div>
    <noscript>This interactive demo requires JavaScript. The full source is on GitHub.</noscript>
    <script type="module" src="assets/app.js"></script>
  </body>
</html>
