# Local infrastructure for development: PostgreSQL + the stateless Python
# microservices. The Node API and Next.js web run via `pnpm dev` and reach the
# services on localhost:8001 / 8002.
services:
  postgres:
    image: postgres:16-alpine
    container_name: shipping-hub-postgres
    environment:
      POSTGRES_USER: shipping
      POSTGRES_PASSWORD: shipping
      POSTGRES_DB: shipping_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipping -d shipping_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

  pricing:
    build: ./services/pricing
    container_name: shipping-hub-pricing
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  labels:
    build: ./services/labels
    container_name: shipping-hub-labels
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
